<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoDev</title>
    <script>
      // Apply the saved/system theme before first paint to avoid a flash of
      // the wrong theme (STL-3). Keep in sync with src/store/themeStore.ts.
      (function () {
        try {
          var stored = localStorage.getItem('autodev_theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <script type="module" crossorigin src="/auto-dev/assets/index-B8VCzM0W.js"></script>
    <link rel="stylesheet" crossorigin href="/auto-dev/assets/index-DU4FzVaE.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
