modules:
  jira:issuePanel:
    - key: autodev-issue-panel
      title: AutoDev
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
      function: issuePanelHandler
  function:
    - key: issuePanelHandler
      handler: src/index.handler
    - key: fetchIssueHandler
      handler: src/index.fetchIssue
permissions:
  scopes:
    - read:jira-work
    - read:jira-user
  external:
    fetch:
      backend:
        - address: http://localhost:3002
        - address: https://api.autodev.local
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/autodev-forge-app
