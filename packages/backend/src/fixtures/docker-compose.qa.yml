# Pinned Node.js 22 Alpine image used by Autodev QA / local compose builds.
x-node-image: &node_image node:22.23-alpine3.18

services:
  app:
    image: *node_image
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: node:22.23-alpine3.18
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: test
      PORT: "4000"
      AUTODEV_BRANCH: ${AUTODEV_BRANCH:-main}
      AUTODEV_BASE_URL: ${AUTODEV_BASE_URL:-http://localhost:4000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
