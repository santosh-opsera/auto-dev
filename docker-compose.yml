services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-autodev}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-autodev_password}
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--eval',
          "db.adminCommand('ping')",
          '-u',
          '${MONGO_INITDB_ROOT_USERNAME:-autodev}',
          '-p',
          '${MONGO_INITDB_ROOT_PASSWORD:-autodev_password}',
          '--authenticationDatabase',
          'admin',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:22.23-alpine3.18
    working_dir: /app
    command: sh -c "npm install && npm run dev -w @autodev/backend"
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      LOG_LEVEL: info
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-autodev}:${MONGO_INITDB_ROOT_PASSWORD:-autodev_password}@mongodb:27017/${MONGO_DATABASE:-autodev}?authSource=admin
      FRONTEND_URL: http://localhost:3001
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: node:22.23-alpine3.18
    working_dir: /app
    command: sh -c "npm install && npm run dev -w @autodev/frontend"
    ports:
      - '3001:3001'
    environment:
      VITE_API_URL: http://localhost:3002
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_node_modules:
  frontend_node_modules:
